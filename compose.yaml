version: '3.9'
services:
  cn_privacy_def_ran_atk_mle_delta0.1:
    build: .
    command:
    - python
    - -m
    - experiments.cn_privacy.exp
    - def_mec=def_ran
    - atk_mec=atk_mle
    - delta=0.1
    - n_bns=1000
    image: bnp:2025
    volumes:
    - ./experiments/cn_privacy/bns:/workspace/experiments/cn_privacy/bns
    - ./experiments/cn_privacy/data:/workspace/experiments/cn_privacy/data
    - ./experiments/cn_privacy/output_def_ran_atk_mle_delta0.1:/workspace/experiments/cn_privacy/output
