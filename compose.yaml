version: '3.9'
services:
  cn_privacy_def_idm_atk_mle_ess1:
    build: .
    command:
    - python
    - -m
    - experiments.cn_privacy.exp
    - def_mec=def_idm
    - ess=1
    - atk_mec=atk_mle
    - n_bns=5
    image: bnp:2025
    volumes:
    - ./experiments/cn_privacy/bns:/workspace/experiments/cn_privacy/bns
    - ./experiments/cn_privacy/data:/workspace/experiments/cn_privacy/data
    - ./experiments/cn_privacy/output_def_idm_atk_mle_ess1:/workspace/experiments/cn_privacy/output
