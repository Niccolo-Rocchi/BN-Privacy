version: '3.9'
services:
  cn_vs_noisybn_def_idm_atk_mle_ess1:
    build: .
    command:
    - python
    - -m
    - experiments.cn_vs_noisybn.exp
    - def_mec=def_idm
    - ess=1
    - atk_mec=atk_mle
    - n_bns=50
    image: bnp:2025
    volumes:
    - ./experiments/cn_vs_noisybn/bns:/workspace/experiments/cn_vs_noisybn/bns
    - ./experiments/cn_vs_noisybn/data:/workspace/experiments/cn_vs_noisybn/data
    - ./experiments/cn_vs_noisybn/output_def_idm_atk_mle_ess1:/workspace/experiments/cn_vs_noisybn/output
