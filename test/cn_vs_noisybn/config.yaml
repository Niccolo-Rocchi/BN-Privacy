## Configuration file

# Paths
out_path: test/cn_vs_noisybn/output                 # Output path
bns_path: bns                                       # Where to save ground-truth BNs
cns_path: cns                                       # Where to save CNs as obtained by def-mec from BNs learnt from pool
atk_path: bns_atk                                   # Where to save BNs as obtained by atk-mec from CNs
noisy_path: noisy                                   # Where to save noisy BNs
data_path: data                                     # Where to save data as generated from ground-truth BNs
results_path: results                               # Where to save the experiment results
exp_meta: exp_meta.txt                              # File of metadata for experiments
auc_meta: auc_meta.csv                              # File of metadata for AUCs

# Models (Naive Bayes)
target_var: 'T'                                     # Target variable
n_nodes: 10                                         # Number of nodes for each BN model
n_modmax: 2                                         # Maximum number of categories for covariates
n_models: 5                                         # Number of models to evaluate

# Data
gpop_ss: 500                                        # Sample size of general population
rpop_prop: 0.5                                      # Sample size of reference population = gpop_ss * rpop_prop
pool_prop: 0.25                                     # Sample size of pool population = gpop_ss * pool_prop
samples: 5                                          # Number of data samples

# MIA
def_mec: 'def_ran'                                  # Defense mechanisms to consider
atk_mec: 'atk_mle'                                  # Attack mechanisms to consider
tol: 0.03                                           # To find eps s.t. |AUC(eps) - AUC(CN)| < tol
error: 'np.logspace(-4, 0, 10, endpoint=False)'     # Type-I errors vector

# Noisy BN
eps_vec: 'np.arange(0.1, 10, 0.1)'                  # Epsilon to consider for noisy BN

# DEF-IDM
ess: 1                                              # ESS: the amount of injected uncertainty

# DEF-RAN
delta: 0.3                                          # Size of random interval for each BN parameter (should be 0 < delta <= 1)

# ATK-MLE
n_bns: 5                                            # Number of BNs to sample within the CN

# Inferences
n_infer: 5                                          # Number of inferences to perform

# Other
seed: 42                                            # Global seed
num_cores: 'multiprocessing.cpu_count() - 1'        # Number of threads to use for parallelization

## Notes
# 1) Suggested pairs (ess: eps_vec) for n_nodes=10: 
#   - 1 : 'np.arange(0.1, 10, 0.1)'
