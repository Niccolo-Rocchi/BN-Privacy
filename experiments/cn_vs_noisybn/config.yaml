## Configuration file

# Paths
out_path: experiments/cn_vs_noisybn/output          # Output path
bns_path: bns/gt                                    # Where to save ground-truth BNs
rpop_path: bns/rpop                                 # Where to save BNs learnt from rpop
pool_path: bns/pool                                 # Where to save BNs learnt from pool
cns_path: cns                                       # Where to save CNs learnt from pool
atk_path: bns/atk                                   # Where to save BN as obtained by atk-mec from a CN
noisy_path: bns/noisy                               # Where to save noisy BNs
data_path: data                                     # Where to save data as generated from ground-truth BNs
results_path: results                               # Where to save the experiment results
exp_meta: exp_meta.txt                              # File of metadata for experiments
auc_meta: auc_meta.csv                              # File of metadata for AUCs

# Models (Naive Bayes)
target_var: 'T'                                     # Target variable
n_nodes: 10                                         # Number of nodes for each BN model
n_modmax: 2                                         # Maximum number of categories for covariates
n_models: 10                                        # Number of models to evaluate

# Data
gpop_ss: 1000                                       # Sample size of general population
rpop_prop: 0.5                                      # Sample size of reference population = gpop_ss * rpop_prop
pool_prop: 0.25                                     # Sample size of pool population = gpop_ss * pool_prop

# MIA
def_mec: 'def_idm'                                  # Defense mechanisms to consider
atk_mec: 'atk_mle'                                  # Attack mechanisms to consider
n_samples: 30                                       # Number of data samples
tol: 0.01                                           # To find eps s.t. |AUC(eps) - AUC(CN)| < tol
error: 'np.logspace(-4, 0, 25, endpoint=False)'     # Type-I errors vector

# DEF-IDM
ess_dict:                                           # Eps list to evaluate for each ess
  1:  'np.arange(0.1, 10, 0.1)'
  10: 'np.arange(0.1, 10, 0.1)'
  20: 'np.arange(0.05, 5, 0.05)'
  30: 'np.arange(1e-3, 1, 1e-3)'
  40: 'np.arange(5e-6, 1e-2, 5e-6)' 
  50: 'np.arange(5e-7, 5e-4, 5e-7)'

# ATK-MLE
n_bns: 50                                           # Number of BNs to sample within the CN

# Inferences
n_infer: 1000                                       # Number of inferences to perform

# Other
seed: 42                                            # Global seed
num_cores: 'multiprocessing.cpu_count() - 1'        # Number of threads to use for parallelization