## Configuration file

# Paths
cur_dir: experiments/cn_vs_noisybn                  # Current directory (contains all the following)
bns_path: bns                                       # Where to save ground-truth BNs
cns_path: output/cns                                # Where to save CNs as obtained by def-mec from BNs learnt from pool
atk_path: output/bns_atk                            # Where to save BNs as obtained by atk-mec from CNs
data_path: data                                     # Where to save data as generated from ground-truth BNs
results_path: output/results                        # Where to save the experiment results
exp_meta: exp_meta.txt                              # File of metadata for experiments
auc_meta: output/results/auc_meta.csv               # File of metadata for AUCs

# Models (Naive Bayes)
target_var: 'T'                                     # Target variable
n_nodes: 10                                         # Number of nodes for each BN model
n_modmax: 2                                         # Maximum number of categories for covariates
n_models: 5                                         # Number of models to evaluate

# Data
gpop_ss: 1000                                       # Sample size of general population
rpop_prop: 0.5                                      # Sample size of reference population = gpop_ss * rpop_prop
pool_prop: 0.25                                     # Sample size of pool population = gpop_ss * pool_prop
samples: 10                                         # Number of data samples

# MIA
error: 'np.logspace(-4, 0, 20, endpoint=False)'     # Type-I errors vector

# Noisy BN
tol: 0.01                                           # To find eps s.t. |AUC(eps) - AUC(CN)| < tol
eps_vec: 'np.logspace(-8, 2, num=300)'              # Epsilon to consider for noisy BN

# Inferences
n_infer: 100                                        # Number of inferences to perform

# Other
num_cores: 'multiprocessing.cpu_count() - 1'        # Number of threads to use for parallelization

## Notes
