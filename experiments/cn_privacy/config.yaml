## Configuration file

# Paths
cur_dir: experiments/cn_privacy                     # Current directory (contains all the following)
bns_path: bns                                       # Where to save ground-truth BNs
cns_path: output/cns                                # Where to save CNs as obtained by def-mec from BNs learnt from pool
atk_path: output/bns_atk                            # Where to save BNs as obtained by atk-mec from CNs
data_path: data                                     # Where to save data as generated from ground-truth BNs
results_path: output/results                        # Where to save the experiment results
exp_meta: exp_meta.txt                              # File of metadata for experiments

# Models
n_nodes_vec: '[10, 20, 30, 50]'                     # List of models' number of nodes
edge_ratio_vec: '[2, 3, 4]'                         # List of models' edge ratio
n_modmax: 3                                         # Maximum number of variables categories

# Data
gpop_ss: 5000                                       # Sample size of general population
rpop_prop: 0.5                                      # Sample size of reference population = gpop_ss * rpop_prop
pool_prop: 0.25                                     # Sample size of pool population = gpop_ss * pool_prop
samples: 200                                        # Number of data samples

# MIA
error: 'np.logspace(-4, 0, 30, endpoint=False)'     # Type-I errors vector

# Other
num_cores: 'multiprocessing.cpu_count() - 1'        # Number of threads to use for parallelization
