## Configuration file

# Paths
out_path: test/cn_privacy/output                    # Output path
bns_path: bns/gt                                    # Where to save ground-truth BNs
rpop_path: bns/rpop                                 # Where to save BNs learnt from rpop
pool_path: bns/pool                                 # Where to save BNs learnt from pool
cns_path: cns                                       # Where to save CNs learnt from pool
atk_path: bns/atk                                   # Where to save BN as obtained by atk-mec from a CNdata_path: data                                     # Where to save data as generated from ground-truth BNs
data_path: data                                     # Where to save data as generated from ground-truth BNs
results_path: results                               # Where to save the experiment results
meta_file: exp_meta.txt                             # File of metadata

# Models
n_nodes_vec: '[10, 15]'                             # List of models' number of nodes
edge_ratio_vec: '[1, 1.5]'                          # List of models' edge ratio
n_modmax: 2                                         # Maximum number of variables categories

# Data
gpop_ss: 500                                        # Sample size of general population
rpop_prop: 0.5                                      # Sample size of reference population = gpop_ss * rpop_prop
pool_prop: 0.25                                     # Sample size of pool population = gpop_ss * pool_prop

# MIA
def_mec: 'def_idm'                                  # Defense mechanisms to consider
atk_mec: 'atk_mle'                                  # Attack mechanisms to consider
n_samples: 5                                        # Number of data samples
error: 'np.logspace(-4, 0, 10, endpoint=False)'     # Type-I errors vector

# DEF-IDM
ess_vec: '[1, 100]'                                 # List of ESS

# ATK-MLE
n_bns: 5                                            # Number of BNs to sample within the CN

# Other
seed: 42                                            # Global seed
num_cores: 'multiprocessing.cpu_count() - 1'        # Number of threads to use for parallelization
